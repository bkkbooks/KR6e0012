  - {type: punctuation, offset: 5894, content: 。, id: KR6e0012_T_007-bkkpn1298}
  - {type: variant, offset: 5894, length: 265, content: 一起斷見言：一切法空，無君臣父子忠孝之道。二末迦梨俱舍梨子，起常見言：一切苦樂不由行業，性自有之。三起自然見，執道不須修，八萬劫苦盡即自然解脫，如轉縷丸於高山頂，旋盡自止。立解脫因，謂解脫為因。非因計因，是邪因也。撥道不須修，是邪見也。四即苦行外道，自拔頭髮、五熱炙身即得解脫。非道計道，亦戒取也。五起邊見，執一切法亦有亦無，不同佛法因緣故有、無性故無。由執有即定性之有，即是常見；執無即定性之無，即是斷見。斷常乖中，合成邊見也。六謂一切苦樂果報皆由過業、不藉現緣，前世業盡即苦盡，縱現修道亦不能斷。此人信有前世業為因，非邪見，撥無現緣即是少分邪見。道能盡苦，撥無不能。道計非道，亦是邪見。六師之計，具如《涅槃》。此六各起一見, 乙: ''}
