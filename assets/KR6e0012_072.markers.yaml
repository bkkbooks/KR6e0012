  - {type: variant, offset: 6516, length: 1, content: 也, 甲: 也鈔若約教相者顯府二意前約教相人之所賤莫過於足人之所貴莫過於頂頂光入足故顯敬深二若約證下自有二意文乃有三一頂光入足顯此菩薩入他佛境二故論下引證三顯證佛境即自證故者是第二意入自佛境因圓趣果故論言平等攝者此有二意一如來下攝足收其光菩薩上攝光入佛境云平等攝二人他佛境即入自境自他佛境無二體故云平等攝是以處中引論證上證下第一平等下疏自具而約二光以明相攝謂菩薩頂光入足佛光入頂今但入足已顯相攝餘可知也}
