  - {type: variant, offset: 1933, length: 109, content: 謂五字五名，四箇一字身、三箇二字身、兩箇三字身、一箇四字身，總此二十相，并上三十，故有五十相。五位總數有一百五相。此上一百五相，但約字名二事。上言十四相者，兼聲句義。又但當字，故言四字四名。今約連帶，成一百五相。若約四字但有五十五相，然十二心不約連帶，然此, 乙: 故成一百五相百法疏亦說此義言其}
