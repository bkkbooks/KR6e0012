body:
  text: 大方廣佛華嚴經隨疏演義序唐清涼山大華嚴寺沙門澄觀述至聖垂誥鏡一心之玄極大士弘闡燭微言之幽致雖忘懷於詮旨之域而浩瀚於文義之海蓋欲寄象繫之迹窮無盡之趣矣斯經文理不可得而稱也晉譯幽祕賢首頗得其門唐翻靈編後哲未窺其奧澄觀不揆膚受輒闡玄微偶溢九州遐飛四海講者盈百咸扣余曰大教趣深疏文致遠親承旨訓髣佛近宗垂範千古慮惑高悟希垂再剖得覩光輝順斯雅懷再此條理名為隨疏演義昔人云人在則易人亡則難今為解釋冀遐方終古得若面會然繁則倦於章句簡則昧其源流顧此才難有慚折中意夫後學其辭不枝矣
